site_name: Fractal Web User Guide

repo_url: https://github.com/fractal-analytics-platform/fractal-web
repo_name: fractal-web

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.magiclink
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist
  - toc:
      permalink: true
  - attr_list
  - md_in_html

theme:
  name: 'material'
  logo: 'https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_logo.png'
  favicon: 'https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_favicon.png'
  custom_dir: 'overrides'
  features:
    - content.code.annotate
    - content.code.copy
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  navigation:
    expand: true

nav:
  - Home page: index.md
  - Projects: projects.md
  - Datasets: datasets.md
  - Workflows: workflows.md

plugins:
  - search
  - autorefs
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - macros

extra_css:
  - extra.css

extra:
  enable_fractal_links: !ENV [ENABLE_FRACTAL_LINKS, true]
  fractal_links_base_url: !ENV [FRACTAL_LINKS_BASE_URL, '']

copyright: |
  © Copyright 2026
  Friedrich Miescher Institute for Biomedical Research and
  University of Zurich
  (see <u><a href="https://github.com/fractal-analytics-platform/fractal-web/blob/main/LICENSE">
  LICENSE
  </a></u>).
