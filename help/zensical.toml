[project]
site_name = "Fractal Web User Guide"
site_url = "https://fractal-analytics-platform.github.io/fractal-web/"
repo_url = "https://github.com/fractal-analytics-platform/fractal-web"
repo_name = "fractal-analytics-platform/fractal-web"
extra_css = ["extra.css"]
copyright = """
© Copyright 2026
Friedrich Miescher Institute for Biomedical Research and
University of Zurich
(see <u><a href="https://github.com/fractal-analytics-platform/fractal-web/blob/main/LICENSE">
LICENSE
</a></u>).
"""

nav = [
    { "Home" = "index.md" },
    { "Projects" = "projects.md" },
    { "Datasets" = "datasets.md" },
    { "Workflows" = "workflows.md" },
]

[project.theme]
variant = "classic"
language = "en"
logo = "https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_logo.png"
favicon = "https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_favicon.png"
custom_dir = "overrides"
navigation = {"expand" = true}

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]


[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep orange"
accent = "orange"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep orange"
accent = "orange"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.plugins.search]

[project.plugins.autorefs]
resolve_closest=true

[project.plugins.section-index]

[project.extra]
enable_fractal_links = true
fractal_links_base_url = ""

[project.markdown_extensions.zensical.extensions.macros]
module_name = "main"
on_error_fail = true
