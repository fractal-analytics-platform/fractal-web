name: Lint and build

on:
  push:
    branches: ['main', 'ihb-develop']
  pull_request:
    branches: ['main', 'ihb-develop']

permissions: {}

jobs:
  lint_and_build:
    name: 'Node ${{ matrix.node-version }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install components dependencies
        run: |
          cd components
          npm ci

      - name: Run static code analysis
        # Run prettier and eslint on all projects
        run: npm run lint

      - name: Run svelte-check on root and components
        run: npx svelte-check

      - name: Run svelte-check on sandbox
        run: |
          cd sandbox
          npx svelte-check

      - name: Run svelte-check on tasks-list
        run: |
          cd tasks-list
          npx svelte-check

      - name: Run svelte-check on templates-list
        run: |
          cd templates-list
          npx svelte-check

      - name: Build site
        env:
          FRACTAL_SERVER_HOST: http://localhost:8000
          AUTH_COOKIE_NAME: fastapiusersauth
          AUTH_COOKIE_SECURE: false
          AUTH_COOKIE_DOMAIN:
          AUTH_COOKIE_PATH: /
          AUTH_COOKIE_SAME_SITE: lax
          PUBLIC_OAUTH_CLIENT_NAME:
          PUBLIC_FRACTAL_ADMIN_SUPPORT_EMAIL:
        run: npm run build

      - name: Install tasks-list dependencies
        run: |
          cd tasks-list
          npm ci

      - name: Build tasks-list
        run: |
          cd tasks-list
          npm run build

      - name: Run Svelte Check
        run: npm run check
