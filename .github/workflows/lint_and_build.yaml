name: Lint and build

on:
  push:
    branches: ['main', 'ihb-develop']
  pull_request:
    branches: ['main', 'ihb-develop']

permissions: {}

jobs:
  lint_and_build:
    name: 'Lint and build - Node ${{ matrix.node-version }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: ['24']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install components dependencies
        run: |
          cd components
          npm ci

      - name: Run static code analysis
        # Run prettier and eslint on all projects
        run: npm run lint

      - name: Run svelte-check on root and components
        run: npm run check

      - name: Build site
        env:
          FRACTAL_SERVER_HOST: http://localhost:8000
          AUTH_COOKIE_NAME: fastapiusersauth
          AUTH_COOKIE_SECURE: true
          AUTH_COOKIE_DOMAIN:
          AUTH_COOKIE_PATH: /
          AUTH_COOKIE_SAME_SITE: lax
          PUBLIC_OAUTH_CLIENT_NAME:
          PUBLIC_FRACTAL_ADMIN_SUPPORT_EMAIL:
        run: npm run build

      - name: Install sandbox dependencies
        run: |
          cd sandbox
          npm ci

      - name: Run svelte-check on sandbox
        run: |
          cd sandbox
          npm run check

      - name: Build sandbox
        run: |
          cd sandbox
          npm run build

      - name: Install tasks-list dependencies
        run: |
          cd tasks-list
          npm ci

      - name: Run svelte-check on tasks-list
        run: |
          cd tasks-list
          npm run check

      - name: Build tasks-list
        run: |
          cd tasks-list
          npm run build

      - name: Install templates-list dependencies
        run: |
          cd templates-list
          npm ci

      - name: Run svelte-check on templates-list
        run: |
          cd templates-list
          npm run check

      - name: Build templates-list
        run: |
          cd templates-list
          npm run build
