name: docs

on: workflow_call

jobs:
  build:
    name: 'Build documentation'
    runs-on: ubuntu-24.04
    permissions: {}
    env:
      ENABLE_FRACTAL_LINKS: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download playwright report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: playwright-html-report-attempt-${{ github.run_attempt }}
          path: docs/playwright-report

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: '0.11.14'
          enable-cache: false
          python-version: '3.12'
      - run: uv sync --frozen
      - run: ./build-docs.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install components dependencies
        run: |
          cd components
          npm ci
      - name: Install sandbox dependencies
        run: |
          cd sandbox
          npm ci
      - name: Build sandbox
        run: |
          cd sandbox
          npm run build
      - name: Move sandbox built files in docs site
        run: mv sandbox/build/ site/sandbox
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'site'

  deploy:
    name: 'Deploy docs'
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    permissions:
      # https://github.com/actions/deploy-pages?tab=readme-ov-file
      # https://docs.github.com/en/actions/how-tos/secure-your-work/security-harden-deployments/oidc-in-cloud-providers#adding-permissions-settings
      pages: write # To create pages deployments when calling the GitHub API
      id-token: write # To request the OIDC JWT token
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
