[project]
site_name = "Fractal Web Client"
site_url = "https://fractal-analytics-platform.github.io/fractal-web/"
repo_url = "https://github.com/fractal-analytics-platform/fractal-web"
repo_name = "fractal-analytics-platform/fractal-web"
extra_css = ["extra.css"]
copyright = """
Copyright 2026 © BioVisionCenter (University of Zurich) - see
<u><a href="https://github.com/fractal-analytics-platform/fractal-web/blob/main/LICENSE">LICENSE</a></u>.
"""

nav = [
    { "Home" = "index.md" },
    { "Quickstart" = "quickstart.md" },
    { "Environment variables" = "environment-variables.md" },
    { "Version compatibility" = "version-compatibility.md" },
    { "Changelog" = "changelog.md" },
    { "OAuth2 integration" = "oauth2.md" },
    { "Development" = "development/" },
    { "Sandbox pages" = "sandbox-pages.md" },
    { "Playwright report" = "playwright-report/index.html" },
]

[project.theme]
variant = "classic"
language = "en"
logo = "https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_logo.png"
favicon = "https://raw.githubusercontent.com/fractal-analytics-platform/fractal-logos/refs/heads/main/common/fractal_favicon.png"
custom_dir = "docs/overrides"
navigation = {"expand" = true}

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]


[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep orange"
accent = "orange"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep orange"
accent = "orange"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.plugins.search]

[project.plugins.autorefs]
resolve_closest=true

[project.plugins.section-index]